spring.application.name=${SPRING_APPLICATION_NAME:AUTH-SERVICE}
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skyBooker}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:my-super-secret-key-my-super-secret-key-12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:framework}

spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8083/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-google-client-secret}

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}

registration.secrets.airline-staff=${AIRLINE_STAFF_SECRET:STAFF_SECRET_XYZ_2024}
registration.secrets.admin=${ADMIN_SECRET:ADMIN_SECRET_ABC_9999}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

management.server.port=${MANAGEMENT_PORT:8081}
