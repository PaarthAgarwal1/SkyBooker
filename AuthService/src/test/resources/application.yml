spring:
  application:
    name: AUTH-SERVICE
  datasource:
    url: jdbc:h2:mem:authservice;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  cloud:
    discovery:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret

eureka:
  client:
    enabled: false

jwt:
  secret: my-super-secret-key-my-super-secret-key-12345
  expiration: 86400000

registration:
  secrets:
    airline-staff: TEST_STAFF_SECRET
    admin: TEST_ADMIN_SECRET

cloudinary:
  cloud-name: test-cloud
  api-key: test-api-key
  api-secret: test-api-secret
