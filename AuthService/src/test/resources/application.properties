spring.datasource.url=jdbc:h2:mem:authservice;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
jwt.secret=my-super-secret-key-my-super-secret-key-12345
jwt.expiration=86400000
registration.secrets.airline-staff=TEST_STAFF_SECRET
registration.secrets.admin=TEST_ADMIN_SECRET
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
CLOUDINARY_CLOUD_NAME=test-cloud
CLOUDINARY_API_KEY=test-api-key
CLOUDINARY_API_SECRET=test-api-secret
