spring:
  application:
    name: PAYMENT-SERVICE
  datasource:
    url: jdbc:h2:mem:paymentservice;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: my-super-secret-key-my-super-secret-key-12345

stripe:
  secret-key: sk_test_123
  webhook-secret: whsec_test_123

service:
  auth:
    token: test-service-token
