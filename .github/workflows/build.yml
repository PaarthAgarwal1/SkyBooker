name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Maven services
        run: |
          for service in \
            AirlineAirportService \
            ApiGateway \
            AuthService \
            BookingService \
            FlightService \
            NotificationService \
            PassengerService \
            PaymentService \
            SeatService \
            ServiceRegistry
          do
            mvn -B -f "$service/pom.xml" verify
          done

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=paarthagarwal1
            -Dsonar.projectKey=PaarthAgarwal1_SkyBooker
            -Dsonar.projectName=SkyBooker
            -Dsonar.sources=AirlineAirportService/src/main,ApiGateway/src/main,AuthService/src/main,BookingService/src/main,FlightService/src/main,NotificationService/src/main,PassengerService/src/main,PaymentService/src/main,SeatService/src/main,ServiceRegistry/src/main
            -Dsonar.tests=AirlineAirportService/src/test,ApiGateway/src/test,AuthService/src/test,BookingService/src/test,FlightService/src/test,NotificationService/src/test,PassengerService/src/test,PaymentService/src/test,SeatService/src/test,ServiceRegistry/src/test
            -Dsonar.java.binaries=AirlineAirportService/target/classes,ApiGateway/target/classes,AuthService/target/classes,BookingService/target/classes,FlightService/target/classes,NotificationService/target/classes,PassengerService/target/classes,PaymentService/target/classes,SeatService/target/classes,ServiceRegistry/target/classes
            -Dsonar.exclusions=**/target/**
