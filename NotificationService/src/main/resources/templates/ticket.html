<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 20px;
        }

        .ticket {
            width: 700px;
            margin: auto;
            border: 1px solid #ddd;
            background: #fff;
        }

        /* HEADER */
        .header {
            background: #1e3a8a;
            color: white;
            padding: 15px;
        }

        .header h2 {
            margin: 0;
        }

        /* ROUTE */
        .route {
            padding: 20px;
            border-bottom: 1px dashed #ccc;
        }

        .route h1 {
            margin: 0;
            font-size: 28px;
        }

        .route span {
            font-size: 16px;
            color: #555;
        }

        /* DETAILS TABLE */
        .details {
            width: 100%;
            border-collapse: collapse;
        }

        .details td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .label {
            color: #888;
            font-size: 12px;
        }

        .value {
            font-size: 16px;
            font-weight: bold;
        }

        /* FOOTER */
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        /* CUT LINE EFFECT */
        .cut-line {
            border-top: 2px dashed #bbb;
        }

        /* RIGHT SIDE (QR AREA STYLE) */
        .right-box {
            text-align: center;
            padding: 20px;
            border-left: 1px dashed #ccc;
        }

    </style>
</head>
<body>

<div class="ticket">

    <!-- HEADER -->
    <div class="header">
        <h2>✈ SkyBooker Boarding Pass</h2>
    </div>

    <!-- ROUTE -->
    <div class="route">
        <h1>[[${departure}]] → [[${arrival}]]</h1>
        <span>Flight [[${flightNumber}]]</span>
    </div>

    <!-- DETAILS -->
    <table class="details">
        <tr>
            <td>
                <div class="label">Passenger</div>
                <div class="value">[[${passengerName}]]</div>
            </td>
            <td>
                <div class="label">PNR</div>
                <div class="value">[[${pnr}]]</div>
            </td>
        </tr>

        <tr>
            <td>
                <div class="label">Seat</div>
                <div class="value">[[${seatNumber}]]</div>
            </td>
            <td>
                <div class="label">Fare</div>
                <div class="value">₹[[${totalFare}]]</div>
            </td>
        </tr>
    </table>

    <!-- CUT LINE -->
    <div class="cut-line"></div>

    <!-- FOOTER -->
    <div class="footer">
        Please arrive at the airport 2 hours before departure.<br/>
        Thank you for choosing SkyBooker ✈
    </div>

</div>

</body>
</html>
