<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background:#f4f6f8; padding:20px;">

<table width="100%">
    <tr>
        <td align="center">

            <table width="600" style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

                <!-- Header -->
                <tr>
                    <td style="background:#b91c1c; color:white; padding:20px; font-size:22px; text-align:center;">
                        ❌ Booking Cancelled
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:25px; color:#333;">
                        <h3>Your booking has been cancelled</h3>

                        <p><b>PNR:</b> [[${pnr}]]</p>
                        <p><b>Refund Amount:</b> ₹[[${refundAmount}]]</p>

                        <p style="margin-top:20px;">
                            The refund will be processed within 5-7 working days.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f1f1f1; text-align:center; padding:15px; font-size:12px; color:#777;">
                        SkyBooker Support Team
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
