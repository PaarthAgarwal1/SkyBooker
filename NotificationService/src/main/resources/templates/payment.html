<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background:#f4f6f8; padding:20px;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

                <!-- Header -->
                <tr>
                    <td style="background:#1e3a8a; color:white; padding:20px; font-size:22px; text-align:center;">
                        💳 SkyBooker Payment Update
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:25px; color:#333;">
                        <h3 style="margin-top:0;">Payment Status:
                            <span style="color: [[${status} == 'SUCCESS' ? 'green' : 'red']]">
                    [[${status}]]
                </span>
                        </h3>

                        <p><b>Amount Paid:</b> ₹[[${amount}]]</p>

                        <p style="margin-top:20px;">
                            Thank you for choosing <b>SkyBooker</b>.
                            Your transaction has been processed successfully.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f1f1f1; text-align:center; padding:15px; font-size:12px; color:#777;">
                        © 2026 SkyBooker | Safe Travels ✈
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
