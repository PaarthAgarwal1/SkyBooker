<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background:#f4f6f8; padding:20px;">

<table width="100%">
    <tr>
        <td align="center">

            <table width="600" style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

                <!-- Header -->
                <tr>
                    <td style="background:#111827; color:white; padding:20px; font-size:22px; text-align:center;">
                        📢 SkyBooker Notification
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:25px; color:#333;">
                        <p style="font-size:16px;">
                            [[${message}]]
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f1f1f1; text-align:center; padding:15px; font-size:12px; color:#777;">
                        Stay tuned with SkyBooker ✈
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
