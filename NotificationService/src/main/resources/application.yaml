server:
  port: 8086

spring:
  application:
    name: NOTIFICATION-SERVICE

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.debug: true

logging:
  level:
    org:
      springframework:
        mail: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER}

jwt:
  secret: ${JWT_SECRET}

service:
  auth:
    token: ${SERVICE_AUTH_TOKEN}