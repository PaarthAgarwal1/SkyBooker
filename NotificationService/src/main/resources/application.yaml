server:
  port: ${SERVER_PORT:8086}

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ${SPRING_APPLICATION_NAME:NOTIFICATION-SERVICE}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skyBooker}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${MAIL_USERNAME:${SMTP_USERNAME:}}
    password: ${MAIL_PASSWORD:${SMTP_PASSWORD:}}

    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.debug: true

logging:
  level:
    org:
      springframework:
        mail: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-my-super-secret-key-12345}

service:
  auth:
    token: ${SERVICE_AUTH_TOKEN:dev-service-token}

management:
  server:
    port: ${MANAGEMENT_PORT:8086}
