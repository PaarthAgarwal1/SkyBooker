spring:
  application:
    name: NOTIFICATION-SERVICE
  datasource:
    url: jdbc:h2:mem:notificationservice;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  mail:
    username: test@example.com
    password: test-password
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: my-super-secret-key-my-super-secret-key-12345

service:
  auth:
    token: test-service-token
